<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vianova Parfüm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-header">

    <div class="top-links">
        <a href="#">Mağazalar</a>
        <a href="#">İletişim</a>
    </div>

    <div class="main-header">
        <div class="logo">VIANOVA</div>

        <div class="search-container">
            <input type="text" placeholder="body mist">
            <button>
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <div class="header-icons">
            <i class="fa-regular fa-user"></i>
            <i class="fa-regular fa-heart"></i>
            <i class="fa-solid fa-bag-shopping"></i>
        </div>
    </div>

    <nav class="category-menu">
        <a href="#"> Kadın Parfüm</a>
        <a href="#"> Erkek Parfüm</a>
        <a href="#"> Koleksiyonlar</a>
        <a href="#">Öne Çıkanlar</a>
        <a href="#">Kampanyalar</a>
    </nav>

</header>

    <section class="hero">
        <h2>Luxury Fragrances</h2>
        <p>Zarafetin Yeni Kokusu</p>
        <button>Alışverişe Başla</button>
    </section>
    <section class="popular-perfumes">
    <h2>Popular Perfumes</h2>

    <div class="perfume-container">

        <div class="perfume-card">
            <img src="images/perfume1.jpg" alt="Perfume">
            <h3>Rose Velvet</h3>
            <p>Floral & Elegant</p>
            <span>₺2.499</span>
        </div>

        <div class="perfume-card">
            <img src="images/perfume2.jpg" alt="Perfume">
            <h3>Midnight Amber</h3>
            <p>Woody & Warm</p>
            <span>₺2.899</span>
        </div>

        <div class="perfume-card">
            <img src="images/perfume3.jpg" alt="Perfume">
            <h3>Vanilla Dream</h3>
            <p>Sweet & Soft</p>
            <span>₺2.299</span>
        </div>

    </div>
</section>

</body>
</html>
