<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vianova Parfüm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-header">

    <div class="top-links">
        <a href="#">Mağazalar</a>
        <a href="#">İletişim</a>
    </div>

    <div class="main-header">
        <div class="logo">
    <img src="images/vianovalogo.png" alt="Vianova">
</div>

        <div class="search-container">
            <input type="text" placeholder="body mist">
            <button>
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <div class="header-icons">
            <i class="fa-regular fa-user"></i>
            <i class="fa-regular fa-heart"></i>
            <i class="fa-solid fa-bag-shopping"></i>
        </div>
    </div>

    <nav class="category-menu">
        <a href="#"> Kadın Parfüm</a>
        <a href="#"> Erkek Parfüm</a>
        <a href="#"> Koleksiyonlar</a>
        <a href="#">Öne Çıkanlar</a>
        <a href="#">Kampanyalar</a>
    </nav>

</header>

    <section class="hero">
        <h2>Luxury Fragrances</h2>
        <p>Zarafetin Yeni Kokusu</p>
        <button>Alışverişe Başla</button>
    </section>
    <section class="featured">
    <h2>Öne Çıkan Parfümler</h2>
    <p class="section-subtitle">Vianova’nın en sevilen niş kokularını keşfedin</p>

    <div class="featured-container">

        <div class="featured-card">
            <img src="images/chrome.jpeg" alt="Chrome">
            <h3>Chrome</h3>
            <p>Erkek Parfüm</p>
            <span>₺1585</span>
            <button>İncele</button>
        </div>

        <div class="featured-card">
            <img src="images/radius.jpeg" alt="Radius">
            <h3>Radius</h3>
            <p>Kadın Parfüm</p>
            <span>₺1662</span>
            <button>İncele</button>
        </div>

        <div class="featured-card">
            <img src="images/offline2.jpeg" alt="Offline">
            <h3>Offline</h3>
            <p>Kadın Parfüm</p>
            <span>₺1650</span>
            <button>İncele</button>
        </div>

    </div>
</section>
    

</body>
</html>
