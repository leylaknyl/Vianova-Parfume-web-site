<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vianova | Products</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="product-page">

  <header class="site-header">
  <div class="top-strip">
    <div class="top-strip-right">
      <a href="#">Mağazalar</a>
      <a href="#">İletişim</a>
    </div>
  </div>

  <div class="main-header product-header-main">
    <div class="logo-area">
      <a href="index.html">
        <img src="../images/vianovalogo.png" alt="Vianova Logo" class="site-logo">
      </a>
    </div>

    <div class="search-area">
      <input type="text" placeholder="Vianova K" class="header-search">
      <button class="search-btn">
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>
    </div>

    <div class="header-icons">
      <i class="fa-regular fa-user"></i>

      <a href="favorites.html" class="favorite-link">
        <i class="fa-regular fa-heart"></i>
        <span>Favoriler</span>
      </a>

      <a href="cart.html" class="cart-link">
        <i class="fa-solid fa-bag-shopping"></i>
      </a>
    </div>
  </div>
</header>

  <section class="products-hero">
    <h1>Niş Parfüm Koleksiyonumuzu Keşfedin</h1>
<p>Kadın ve erkek koleksiyonları için tasarlanmış zarif kokuları inceleyin.</p>
  </section>


    

   <section class="filter-section">
  <select id="categoryFilter">
    <option value="all">Tüm Kategoriler</option>
    <option value="Kadın">Kadın</option>
    <option value="Erkek">Erkek</option>
  </select>

  <select id="scentFilter">
    <option value="all">Tüm Koku Türleri</option>
    <option value="Oriental">Oryantal</option>
    <option value="Floral">Çiçeksi</option>
    <option value="Fruity">Meyveli</option>
    <option value="Spicy">Baharatlı</option>
    <option value="Aromatic">Aromatik</option>
  </select>

  <select id="priceFilter">
    <option value="all">Tüm Fiyatlar</option>
    <option value="low">₺1600 Altı</option>
    <option value="mid">₺1600 - ₺1650</option>
    <option value="high">₺1650 Üzeri</option>
  </select>
</section>

  <main class="products-container" id="productsContainer">
    <!-- Products will be displayed here with JavaScript -->
  </main>

 <script src="../js/products.js"></script>
</body>
</html>
