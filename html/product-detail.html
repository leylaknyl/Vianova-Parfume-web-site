<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vianova | Ürün Detayı</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="product-detail-page"></body>
<header class="site-header">
  <div class="top-strip">
    <div class="top-strip-right">
      <a href="#">Mağazalar</a>
      <a href="#">İletişim</a>
    </div>
  </div>

  <div class="main-header product-header-main">
    <div class="logo-area">
      <a href="index.html">
        <img src="../images/vianovalogo.png" alt="Vianova Logo" class="site-logo">
      </a>
    </div>

    <div class="search-area">
      <input type="text" placeholder="Vianova K" class="header-search">
      <button class="search-btn">
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>
    </div>

    <div class="header-icons">
      <i class="fa-regular fa-user"></i>

      <a href="favorites.html" class="favorite-link">
        <i class="fa-regular fa-heart"></i>
        <span>Favoriler</span>
      </a>

      <a href="cart.html" class="cart-link">
        <i class="fa-solid fa-bag-shopping"></i>
      </a>
    </div>
  </div>
</header>

  <main class="detail-page">
    <a href="products.html" class="back-link">← Ürünlere Dön</a>

    <section class="detail-container" id="detailContainer">
      <!-- Ürün detayı JavaScript ile eklenecek -->
    </section>
  </main>

  <script src="../js/products.js"></script>
  <script src="../js/product-detail.js"></script>
</body>
</html>
