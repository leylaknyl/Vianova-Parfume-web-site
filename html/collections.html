<!doctype html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vianova Koleksiyonlar</title>
    <link rel="stylesheet" href="../css/collections.css">
</head>
<body>

    <section class="collection-hero">
        <video autoplay muted loop playsinline>
            <source src="../images/koleksiyonvideo.mp4" type="video/mp4">
        </video>

        <div class="collection-overlay">
            <h1>Vianova Koleksiyonları</h1>
            <p>Her karaktere uygun seçkin niş kokular</p>
        </div>
    </section>

    <section class="collections">

        <div class="collection-card">
            <img src="../images/koleksiyon2.jpeg" alt="Erkek Koleksiyonu">

            <div class="collection-text">
                <span>Erkek Serisi</span>
                <h2>Erkek Koleksiyonu</h2>
                <p>Güçlü karakterler için tasarlanan kalıcı ve maskülen notalar.</p>
                <a href="products.html?category=erkek">Koleksiyonu Keşfet</a>
            </div>
        </div>

        <div class="collection-card reverse">
            <img src="../images/koleksiyon.jpeg" alt="Kadın Koleksiyonu">

            <div class="collection-text">
                <span>Kadın Serisi</span>
                <h2>Kadın Koleksiyonu</h2>
                <p>Zarafeti ve özgünlüğü yansıtan seçkin kadın kokuları.</p>
                <a href="products.html?category=kadin">Koleksiyonu Keşfet</a>
            </div>
        </div>

    </section>

</body>
</html>
